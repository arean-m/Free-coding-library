<div class="lg:col-span-1 bg-gray-800 border border-gray-700 rounded-2xl p-6 h-fit sticky top-6">
    <h2 class="text-xl font-bold text-white mb-1">Suggest a Resource</h2>
    <p class="text-xs text-gray-400 mb-6">Found a great free tutorial? Share it with the community.</p>
    
    <form action="/" method="POST" class="space-y-4">
        {% csrf_token %} 
        
        <div>
            <label class="block text-xs font-semibold uppercase tracking-wider text-gray-400 mb-2">Resource Title</label>
            {{ form.title }}
        </div>
        <div>
            <label class="block text-xs font-semibold uppercase tracking-wider text-gray-400 mb-2">Subject / Topic</label>
            {{ form.topic }}
        </div>
        <div>
            <label class="block text-xs font-semibold uppercase tracking-wider text-gray-400 mb-2">Brief Description</label>
            {{ form.description }}
        </div>
        <div>
            <label class="block text-xs font-semibold uppercase tracking-wider text-gray-400 mb-2">URL / Link</label>
            {{ form.resource_url }}
        </div>

        <button type="submit" class="w-full bg-emerald-500 hover:bg-emerald-600 text-gray-950 font-bold py-3 px-4 rounded-xl transition duration-150 shadow-lg cursor-pointer text-center block mt-6">
            Submit to Directory
        </button>
    </form>
</div>
